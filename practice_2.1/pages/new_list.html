<!DOCTYPE html>
<html lang="ru">
	<head>
		<meta charset="utf-8">
		<title>Список стран мира</title>
		<link rel="stylesheet" href="CSS/main.css">
		<script src="JavaScript/data.js"></script>
		<script src="JavaScript/main.js"></script>
		<script src="JavaScript/table.js"></script>
		<script src="JavaScript/filter.js"></script>
		<script src="JavaScript/sort.js"></script>
	</head>
	<body>
		<form id="filter">
			<p>
				<label for="country">Название:</label>
				<input type="text" id="country">
			</p>
			<p>
				<label for="capital">Столица:</label>
				<input type="text" id="capital">
			</p>
			<p>
				<label for="government">Форма правления:</label>
				<input type="text" id="government">
			</p>
			<p>
				<label for="regime">Режим:</label>
				<input type="text" id="regime">
			</p>
			<p>
				<label for="continent">Континент:</label>
				<input type="text" id="continent">
			</p>
			<p>
				<label for="populationFrom">Население: </label>
				от <input type="number" id="populationFrom"> 
				до <input type="number" id="populationTo">
			</p>
			<p>
				<label for="gdpFrom">ВВП на душу населения($):</label>
				от <input type="number" id="gdpFrom"> 
				до <input type="number" id="gdpTo">
			</p>
			<input type="button" value="Найти" id="btn-find">
			<input type="button" value="Очистить фильтры" id="btn-clear"> 
		</form>
		<form id="sort">
			<p> Сортировать по</p>
			<p>
				<select id="fieldsFirst">
				</select> 
				по убыванию? <input  type="checkbox"  id="fieldsFirstDesc">
			</p>
			<p> 
				<select id="fieldsSecond">
				</select> 
				по убыванию? <input  type="checkbox"  id="fieldsSecondDesc">
			</p>
			<p> 
				<select id="fieldsThird">
				</select> 
				по убыванию? <input  type="checkbox"  id="fieldsThirdDesc">
			</p>
			<input type="button" value="Сортировать" id="btn-sort"> 
			<input type="button" value="Сбросить сортировку" id="btn-reset">
		</form>
		<table id="list">
		</table>
	</body>
</html>
